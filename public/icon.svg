<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c9a7"/>
      <stop offset="100%" stop-color="#007a5e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="512" height="260" rx="108" ry="108" fill="url(#shine)" clip-path="url(#roundedClip)"/>

  <!-- Soft inner shadow ring (decorative) -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

  <!-- Dollar sign: S curve (drawn with stroke, no fill) -->
  <path
    d="M 308,198
       C 308,152 282,128 256,128
       C 230,128 190,148 190,195
       C 190,235 220,250 256,263
       C 292,276 324,293 324,335
       C 324,376 296,388 256,388
       C 216,388 186,365 186,328"
    fill="none"
    stroke="white"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Vertical bar (on top of S curve) -->
  <rect x="232" y="88" width="48" height="336" rx="24" ry="24" fill="white"/>
</svg>
